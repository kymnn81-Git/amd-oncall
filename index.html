<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>データ復元ツール</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
body { font-family: sans-serif; padding: 20px; max-width: 640px; margin: 0 auto; background:#f8fafc; }
h2 { color: #1e293b; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.card h3 { margin: 0 0 10px; font-size: 15px; color: #334155; }
button { background: #3b82f6; color: white; border: none; padding: 14px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
button:disabled { background: #94a3b8; }
#log { margin-top: 12px; padding: 12px; background: #f1f5f9; border-radius: 8px; white-space: pre-wrap; font-size: 13px; line-height: 1.9; min-height: 60px; }
.warn { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 14px; }
pre { font-size: 12px; line-height: 1.8; color: #475569; margin: 0; }
</style>
</head>
<body>
<h2>🔧 2026年4月 データ復元ツール</h2>
<div class="warn">
⚠️ <strong>復元できるデータ</strong><br>
✅ 当番表（割り振り）：Excelの画像から復元<br>
✅ 不在情報：Excelの画像から復元<br>
❌ 各医師の◎○×入力：復元不可
</div>

<div class="card">
  <h3>📅 当番表（2026年4月）</h3>
  <pre id="prev-assign"></pre>
</div>
<div class="card">
  <h3>🏥 不在情報（2026年4月）</h3>
  <pre id="prev-abs"></pre>
</div>

<button onclick="restore()" id="btn">▶ 復元を実行する</button>
<div id="log">ボタンを押すと復元を開始します</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB8H2zwkrZquw9qvNxDxKobqMRyLJp13qo",
  authDomain: "amd-oncall-system.firebaseapp.com",
  projectId: "amd-oncall-system",
  storageBucket: "amd-oncall-system.firebasestorage.app",
  messagingSenderId: "515760380634",
  appId: "1:515760380634:web:b3dba864a1f8ccf388a3e3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC_REF = db.collection('oncall').doc('main');

const names = {
  d0:"北野滋久", d1:"古川孝広", d2:"宮脇英里子", d3:"大本晃弘",
  d4:"尾崎由記範", d5:"福岡聖大", d6:"増田淳", d7:"仲尾岳大",
  d8:"竹村弘司", d9:"大岩修太郎"
};

// ── 当番表 ──────────────────────────────
const assignments_2026_04 = {
  "2026-04-01":"d3","2026-04-02":"d9","2026-04-03":"d8","2026-04-04":"d9",
  "2026-04-05":"d3","2026-04-06":"d2","2026-04-07":"d3","2026-04-08":"d7",
  "2026-04-09":"d3","2026-04-10":"d6","2026-04-11":"d2","2026-04-12":"d8",
  "2026-04-13":"d7","2026-04-14":"d8","2026-04-15":"d9","2026-04-16":"d4",
  "2026-04-17":"d7","2026-04-18":"d9","2026-04-19":"d2","2026-04-20":"d8",
  "2026-04-21":"d9","2026-04-22":"d7","2026-04-23":"d9","2026-04-24":"d7",
  "2026-04-25":"d8","2026-04-26":"d5","2026-04-27":"d2","2026-04-28":"d8",
  "2026-04-29":"d8","2026-04-30":"d9"
};

// ── 不在情報（Excelから読み取り）────────────────
// 古川孝広(d1): 4/4, 4/11, 4/18, 4/25, 4/29 全日
// 宮脇英里子(d2): 4/9 全日
// 大本晃弘(d3): 4/13, 4/14, 4/15, 4/16 全日
const absences_2026_04 = [
  { id:"abs-2604-01", doctorId:"d1", date:"2026-04-04", period:"全日", reason:"その他", note:"" },
  { id:"abs-2604-02", doctorId:"d2", date:"2026-04-09", period:"全日", reason:"その他", note:"" },
  { id:"abs-2604-03", doctorId:"d1", date:"2026-04-11", period:"全日", reason:"その他", note:"" },
  { id:"abs-2604-04", doctorId:"d3", date:"2026-04-13", period:"全日", reason:"その他", note:"" },
  { id:"abs-2604-05", doctorId:"d3", date:"2026-04-14", period:"全日", reason:"その他", note:"" },
  { id:"abs-2604-06", doctorId:"d3", date:"2026-04-15", period:"全日", reason:"その他", note:"" },
  { id:"abs-2604-07", doctorId:"d3", date:"2026-04-16", period:"全日", reason:"その他", note:"" },
  { id:"abs-2604-08", doctorId:"d1", date:"2026-04-18", period:"全日", reason:"その他", note:"" },
  { id:"abs-2604-09", doctorId:"d1", date:"2026-04-25", period:"全日", reason:"その他", note:"" },
  { id:"abs-2604-10", doctorId:"d1", date:"2026-04-29", period:"全日", reason:"その他", note:"" },
];

// プレビュー表示
const wdays = ['日','月','火','水','木','金','土'];
let pa = '';
Object.entries(assignments_2026_04).forEach(([date, id]) => {
  const dw = wdays[new Date(date+'T00:00:00').getDay()];
  pa += `${date}（${dw}）: ${names[id]}\n`;
});
document.getElementById('prev-assign').textContent = pa;

let pb = '';
absences_2026_04.forEach(a => {
  const dw = wdays[new Date(a.date+'T00:00:00').getDay()];
  pb += `${a.date}（${dw}）: ${names[a.doctorId]} ${a.period} ${a.reason}\n`;
});
document.getElementById('prev-abs').textContent = pb;

async function restore() {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '復元中...';
  const log = document.getElementById('log');
  log.textContent = 'Firestoreに接続中...\n';
  try {
    const snap = await DOC_REF.get();
    let data = snap.exists ? snap.data() : {};

    // 当番表を復元
    if (!data.assignments) data.assignments = {};
    data.assignments['2026-04'] = assignments_2026_04;
    log.textContent += '✅ 当番表セット\n';

    // 不在情報を復元（既存の他月分は保持、4月分のみ上書き）
    if (!Array.isArray(data.absences)) data.absences = [];
    // 4月分を削除して新しいデータを追加
    data.absences = data.absences.filter(a => !a.date.startsWith('2026-04'));
    data.absences = data.absences.concat(absences_2026_04);
    log.textContent += '✅ 不在情報セット\n';

    // 累計（FY2025）再計算
    if (!data.cumulative) data.cumulative = {};
    data.cumulative['fy2025'] = {};
    Object.entries(data.assignments).forEach(([mk, ass]) => {
      const parts = mk.split('-');
      const y = parseInt(parts[0]), m = parseInt(parts[1]);
      if ((m >= 4 ? y : y-1) === 2025) {
        Object.values(ass).forEach(id => {
          if (id) data.cumulative['fy2025'][id] = (data.cumulative['fy2025'][id]||0)+1;
        });
      }
    });
    log.textContent += '✅ 累計再計算\n';

    await DOC_REF.set(data);
    log.textContent += '\n🎉 復元完了！アプリを開いて確認してください。';
    btn.textContent = '✅ 復元完了'; btn.style.background = '#22c55e';
  } catch(e) {
    log.textContent += '❌ エラー: ' + e.message;
    btn.disabled = false; btn.textContent = '▶ 再試行';
  }
}
</script>
</body>
</html>
